<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>صفحتي</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f8fafc;
    text-align: center;
}

header {
    background: #0f172a;
    color: white;
    padding: 40px;
}

section {
    padding: 30px;
}

.plans {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.plan {
    background: white;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
}

button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 10px;
}
</style>

</head>

<body>

<header>
    <h1>منصتي</h1>
    <p>أفضل اشتراكات الألعاب 🎮</p>
</header>

<section>
    <h2>طريقة الاستخدام</h2>
    <p>اختر الباقة - ادفع - استلم الحساب</p>
</section>

<section>
    <h2>الاشتراكات</h2>

    <div class="plans">
        <div class="plan">
            <h3>شهر</h3>
            <p>20 ريال</p>
            <button>اشترك</button>
        </div>

        <div class="plan">
            <h3>3 شهور</h3>
            <p>50 ريال</p>
            <button>اشترك</button>
        </div>
    </div>
</section>

<section>
    <h2>الأسئلة الشائعة</h2>
    <p>هل الحساب دائم؟ نعم</p>
</section>

</body>
</html>
